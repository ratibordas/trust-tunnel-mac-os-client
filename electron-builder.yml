appId: com.trusttunnel.desktop
productName: TrustTunnel Desktop
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  # Menu-bar (tray) template icons, loaded at runtime from process.resourcesPath.
  - from: resources/trayTemplate.png
    to: trayTemplate.png
  - from: resources/trayTemplate@2x.png
    to: trayTemplate@2x.png
  # Status-coloured Dock icon variants, swapped at runtime by connection state.
  - from: resources/dock-idle.png
    to: dock-idle.png
  - from: resources/dock-connected.png
    to: dock-connected.png
  - from: resources/dock-connecting.png
    to: dock-connecting.png
  # The trusttunnel_client binary is downloaded at runtime into userData, so it
  # is NOT bundled. To ship one inside the .app, drop it into resources/ and add:
  # - from: resources/trusttunnel_client
  #   to: trusttunnel_client
mac:
  # build/icon.icns is picked up automatically (directories.buildResources: build).
  icon: build/icon.icns
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  # arm64 + x64 in one universal build matching the upstream universal binary.
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  # Signing/notarization is optional for local use. To distribute, set
  # CSC_LINK / CSC_KEY_PASSWORD and Apple notarization env vars. See README.
dmg:
  title: ${productName} ${version}
